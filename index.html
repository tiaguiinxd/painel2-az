document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

v class=\"hint\">Acima desta margem o termômetro fica verde.<\u002Fdiv>\n        <div class=\"secrow\"><div class=\"stepper\"><button id=\"mMinus\">−<\u002Fbutton><\u002Fdiv><div class=\"secval\"><span id=\"mNum\">30<\u002Fspan><span>%<\u002Fspan><\u002Fdiv><div class=\"stepper\"><button id=\"mPlus\">+<\u002Fbutton><\u002Fdiv><input type=\"range\" id=\"mRange\" min=\"15\" max=\"45\" step=\"1\" value=\"30\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"cfgrow\"><div class=\"lab\">Tolerância de atraso<\u002Fdiv><div class=\"hint\">Pontos que o físico pode ficar abaixo do plano antes do vermelho.<\u002Fdiv>\n        <div class=\"secrow\"><div class=\"stepper\"><button id=\"tMinus\">−<\u002Fbutton><\u002Fdiv><div class=\"secval\"><span id=\"tNum\">15<\u002Fspan><span>pp<\u002Fspan><\u002Fdiv><div class=\"stepper\"><button id=\"tPlus\">+<\u002Fbutton><\u002Fdiv><input type=\"range\" id=\"tRange\" min=\"5\" max=\"30\" step=\"1\" value=\"15\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cfgfoot\"><div class=\"keys\"><b>F<\u002Fb> tela cheia · <b>C<\u002Fb> ajustes<\u002Fdiv><button class=\"cfgclose\" id=\"cfgok\">Pronto<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ════════════════════════════════════════════════════════════════════\n   TERMÔMETRO EXECUTIVO · AZ-TECH  —  painel de tela única\n   Tudo é CALCULADO a partir da lista OBRAS abaixo. Atualize os números\n   das obras a cada semana e ponteiros, cores e textos se ajustam sozinhos.\n   ════════════════════════════════════════════════════════════════════ */\nvar CONFIG = { metaMargem:30, tolPrazo:15 };\n\n/* ─────────── DADOS DAS OBRAS (atualizar semanalmente) ───────────\n   d=disciplina(TUB|PIN|CIV) · fat=contrato R$mil(peso) · real/plan=% físico\n   gasto=% orçado gasto · fatPct=% faturado/medido (null=não rastreado)\n   margem=% projetada · medic=R$mil a faturar · ativo=em execução? */\nvar OBRAS = [\n {d:'TUB',nome:'GLP — Mauá',cli:'Nacional Gás · SP',fat:713,real:100,plan:100,gasto:83.9,fatPct:50,margem:37.5,medic:356,ativo:true},\n {d:'TUB',nome:'Água Externa — Esmaltec',cli:'Esmaltec · CE',fat:2050,real:69,plan:69,gasto:33,fatPct:30,margem:45.1,medic:514,ativo:true},\n {d:'TUB',nome:'GLP — Paulínia',cli:'Nacional Gás · SP',fat:687,real:77,plan:86,gasto:55.8,fatPct:50,margem:40.5,medic:344,ativo:true},\n {d:'TUB',nome:'GLP — Macaé',cli:'Nacional Gás · RJ',fat:1740,real:72,plan:89,gasto:61.5,fatPct:30,margem:36.3,medic:348,ativo:true},\n {d:'TUB',nome:'GLP — Fortaleza',cli:'Nacional Gás · CE',fat:775,real:35,plan:56,gasto:31.1,fatPct:30,margem:36.5,medic:0,ativo:true},\n {d:'TUB',nome:'GLP — Crato',cli:'Nacional Gás · CE',fat:891,real:20,plan:75,gasto:28,fatPct:30,margem:36.6,medic:0,ativo:true},\n {d:'TUB',nome:'Belém SCI',cli:'Nacional Gás · PA',fat:5030,real:0,plan:0,gasto:0,fatPct:null,margem:49.7,medic:1500,ativo:false},\n {d:'PIN',nome:'São Luís',cli:'Copa Energia · MA',fat:439,real:70,plan:100,gasto:71.4,fatPct:0,margem:24.8,medic:0,ativo:true},\n {d:'PIN',nome:'D. Caxias',cli:'Nac. Gás Butano · RJ',fat:967,real:6,plan:23,gasto:38.7,fatPct:30,margem:25.8,medic:0,ativo:true},\n {d:'PIN',nome:'Guamaré',cli:'Nac. Gás Butano · RN',fat:350,real:50,plan:67,gasto:49.7,fatPct:30,margem:20.8,medic:0,ativo:true},\n {d:'PIN',nome:'Belém I+II',cli:'Nac. Gás Butano · PA',fat:1060,real:1,plan:31,gasto:35,fatPct:30,margem:33.3,medic:0,ativo:true},\n {d:'PIN',nome:'Canoas',cli:'Copa Energia · RS',fat:647,real:47,plan:100,gasto:58,fatPct:100,margem:16.4,medic:0,ativo:true},\n {d:'PIN',nome:'Macaé I+II',cli:'Nac. Gás Butano · RJ',fat:614,real:1,plan:1,gasto:5.1,fatPct:30,margem:29.6,medic:0,ativo:true},\n {d:'CIV',nome:'Caminho Seguro',cli:'Nacional Gás · MA',fat:596,real:44,plan:37,gasto:64,fatPct:null,margem:30.06,medic:0,ativo:true},\n {d:'CIV',nome:'Betim II · Em Execução',cli:'Nacional Gás · MG',fat:1590,real:27,plan:26,gasto:48,fatPct:null,margem:40.82,medic:0,ativo:true},\n {d:'CIV',nome:'Betim II · Aditivo',cli:'Nacional Gás · MG',fat:570,real:null,plan:null,gasto:25,fatPct:null,margem:38.25,medic:0,ativo:false},\n {d:'CIV',nome:'Betim II · Não Iniciado',cli:'Nacional Gás · MG',fat:358,real:null,plan:null,gasto:null,fatPct:null,margem:40.0,medic:0,ativo:false}\n];\nvar DISC = { TUB:{nome:'Tubulações'}, PIN:{nome:'Pinturas'}, CIV:{nome:'Obras Civis'} };\n\n/* ─────────── PALETA (Claude · tons claros + laranja) ─────────── */\nvar K={ ink:'#23211D', ink2:'#56524A', ink3:'#8C8579', line:'#E7DECE', card:'#FFFFFF', bg:'#F4F0E8',\n        acc:'#C15F3C', green:'#5B8C5A', amber:'#C8860D', red:'#BF4D3A',\n        track:'#ECE3D2', greenT:'#E7EFE3', amberT:'#F5EAD2', redT:'#F4E0DA' };\nfunction statusCor(s){ return s>=75?K.green:(s>=55?K.amber:K.red); }\nfunction statusTint(s){ return s>=75?K.greenT:(s>=55?K.amberT:K.redT); }\nfunction statusWord(s){ return s>=75?'SAUDÁVEL':(s>=55?'ATENÇÃO':'CRÍTICO'); }\nfunction vg(n,dec){ return (typeof n==='number'? n.toFixed(dec==null?0:dec):n).replace('.',','); }\nfunction ppTxt(v){ var r=Math.round(v); return (r>0?'+':(r<0?'−':''))+Math.abs(r)+' pp'; }\nfunction rs(mil){ if(mil>=1000){ return 'R$ '+(mil/1000).toFixed(2).replace('.',',')+'M'; } return 'R$ '+Math.round(mil)+'K'; }\n\n/* ─────────── MOTOR DE CÁLCULO ─────────── */\nfunction scoreSched(d){ var T=CONFIG.tolPrazo; if(d>=5)return 100; if(d>=0)return 82+(d/5)*18; if(d>=-T)return 50+((d+T)/T)*32; return Math.max(5,50+(d+T)*2); }\nfunction scoreCost(c){ if(c>=10)return 100; if(c>=0)return 80+(c/10)*20; if(c>=-25)return 80+(c/25)*55; return Math.max(5,25+(c+25)); }\nfunction scoreMarg(m){ var M=CONFIG.metaMargem; if(m>=M+12)return 100; if(m>=M)return 78+((m-M)/12)*22; if(m>=M-8)return 50+((m-(M-8))/8)*28; return Math.max(8,50-((M-8)-m)*2); }\nfunction scoreCaixa(k){ if(k>=5)return 96; if(k>=0)return 82+k*2.8; return Math.max(8,82+k*1.8); }\nfunction agg(list){\n  var sW=0,sN=0,cW=0,cN=0,mW=0,mN=0,kW=0,kN=0,fatSum=0,medSum=0,mbN=0,n=0,ativos=0;\n  list.forEach(function(o){ fatSum+=o.fat; medSum+=o.medic||0; n++; if(o.ativo)ativos++;\n    if(o.margem!=null) mbN+=o.fat*o.margem/100;\n    if(o.ativo&&o.real!=null&&o.plan!=null){ sW+=o.fat; sN+=o.fat*(o.real-o.plan); }\n    if(o.ativo&&o.real!=null&&o.gasto!=null){ cW+=o.fat; cN+=o.fat*(o.real-o.gasto); }\n    if(o.margem!=null){ mW+=o.fat; mN+=o.fat*o.margem; }\n    if(o.ativo&&o.fatPct!=null&&o.gasto!=null){ kW+=o.fat; kN+=o.fat*(o.fatPct-o.gasto); }\n  });\n  var sched=sW?sN/sW:null, cost=cW?cN/cW:null, margem=mW?mN/mW:null, caixa=kW?kN/kW:null;\n  var ss=sched==null?null:scoreSched(sched), sc=cost==null?null:scoreCost(cost), sm=margem==null?null:scoreMarg(margem), sk=caixa==null?null:scoreCaixa(caixa);\n  var W={s:.25,c:.25,m:.30,k:.20}, hw=0,hn=0;\n  if(ss!=null){hw+=W.s;hn+=W.s*ss;} if(sc!=null){hw+=W.c;hn+=W.c*sc;} if(sm!=null){hw+=W.m;hn+=W.m*sm;} if(sk!=null){hw+=W.k;hn+=W.k*sk;}\n  return {sched:sched,cost:cost,margem:margem,caixa:caixa,ss:ss,sc:sc,sm:sm,sk:sk,health:hw?hn/hw:null,fatSum:fatSum,medSum:medSum,mbRS:mbN,n:n,ativos:ativos};\n}\n\n/* ─────────── GAUGE COM PONTEIRO (SVG) ─────────── */\nfunction gauge(score, S){\n  // S: {w,cx,cy,r,sw,needle,hub}\n  var cx=S.cx,cy=S.cy,r=S.r,sw=S.sw;\n  function pt(v,rr){ var a=(180-Math.max(0,Math.min(100,v))*1.8)*Math.PI/180; return [cx+rr*Math.cos(a), cy-rr*Math.sin(a)]; }\n  function arc(v1,v2,col){ var p1=pt(v1,r),p2=pt(v2,r); return '<path d=\"M'+p1[0].toFixed(1)+' '+p1[1].toFixed(1)+' A'+r+' '+r+' 0 0 1 '+p2[0].toFixed(1)+' '+p2[1].toFixed(1)+'\" fill=\"none\" stroke=\"'+col+'\" stroke-width=\"'+sw+'\"/>'; }\n  // zonas: vermelho 0-50, âmbar 50-75, verde 75-100\n  var zones = arc(0,50,K.red)+arc(50,75,K.amber)+arc(75,100,K.green);\n  // ticks finos nos limites\n  function tick(v){ var a=(180-v*1.8)*Math.PI/180, ri=r-sw/2, ro=r+sw/2; return '<line x1=\"'+(cx+ri*Math.cos(a)).toFixed(1)+'\" y1=\"'+(cy-ri*Math.sin(a)).toFixed(1)+'\" x2=\"'+(cx+ro*Math.cos(a)).toFixed(1)+'\" y2=\"'+(cy-ro*Math.sin(a)).toFixed(1)+'\" stroke=\"#FBF9F4\" stroke-width=\"2.5\"/>'; }\n  // ponteiro\n  var a=(180-Math.max(0,Math.min(100,score))*1.8)*Math.PI/180;\n  var nl=S.needle, tipx=cx+nl*Math.cos(a), tipy=cy-nl*Math.sin(a);\n  var bh=S.hub*0.62, px=Math.sin(a), py=Math.cos(a);\n  var tailx=cx-nl*0.16*Math.cos(a), taily=cy+nl*0.16*Math.sin(a);\n  var needle='<polygon points=\"'+(cx+bh*px).toFixed(1)+','+(cy+bh*py).toFixed(1)+' '+tipx.toFixed(1)+','+tipy.toFixed(1)+' '+(cx-bh*px).toFixed(1)+','+(cy-bh*py).toFixed(1)+' '+tailx.toFixed(1)+','+taily.toFixed(1)+'\" fill=\"'+K.ink+'\"/>';\n  var hub='<circle cx=\"'+cx+'\" cy=\"'+cy+'\" r=\"'+S.hub+'\" fill=\"'+K.ink+'\"/><circle cx=\"'+cx+'\" cy=\"'+cy+'\" r=\"'+(S.hub*0.4)+'\" fill=\"#FBF9F4\"/>';\n  return '<svg viewBox=\"0 0 '+S.w+' '+(cy+S.hub+4)+'\" style=\"width:100%;height:auto;display:block;overflow:visible\">'+zones+tick(50)+tick(75)+needle+hub+'<\u002Fsvg>';\n}\nvar GBIG={w:430,cx:215,cy:212,r:172,sw:34,needle:150,hub:17};\nvar GMED={w:240,cx:120,cy:120,r:96,sw:21,needle:84,hub:11};\n\n/* ─────────── COMPONENTES ─────────── */\nfunction dotLight(score,label){\n  var c=statusCor(score);\n  return '<div style=\"display:flex;flex-direction:column;align-items:center;gap:7px\">'\n    + '<span style=\"width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #ffffff66, '+c+' 62%);box-shadow:0 0 0 3px '+c+'22, inset 0 -2px 3px rgba(0,0,0,.25)\"><\u002Fspan>'\n    + '<span style=\"font-size:11.5px;font-weight:600;letter-spacing:.4px;color:'+K.ink2+'\">'+label+'<\u002Fspan>'\n  + '<\u002Fdiv>';\n}\nfunction gaugeMed(label, score, big, sub){\n  var col=statusCor(score), word=statusWord(score);\n  return '<div style=\"flex:1;min-width:0;background:'+K.card+';border:1px solid '+K.line+';border-radius:18px;padding:18px 18px 16px;display:flex;flex-direction:column;align-items:center\">'\n    + '<div style=\"width:100%;display:flex;justify-content:space-between;align-items:center\"><span style=\"font-size:13.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:'+K.ink2+'\">'+label+'<\u002Fspan>'\n    +   '<span style=\"width:10px;height:10px;border-radius:50%;background:'+col+'\"><\u002Fspan><\u002Fdiv>'\n    + '<div style=\"width:78%;margin-top:8px\">'+gauge(score,GMED)+'<\u002Fdiv>'\n    + '<div style=\"font-family:\\'Newsreader\\',serif;font-weight:600;font-size:34px;line-height:1;color:'+col+';margin-top:2px\">'+big+'<\u002Fdiv>'\n    + '<div style=\"font-size:12px;color:'+K.ink3+';margin-top:2px\">'+sub+'<\u002Fdiv>'\n  + '<\u002Fdiv>';\n}\nfunction tagObra(o){\n  if(o.ativo&&o.gasto!=null&&o.real!=null&&(o.gasto-o.real)>=20) return 'CUSTO';\n  if(o.margem!=null&&o.margem<CONFIG.metaMargem-8) return 'MARGEM';\n  if(o.ativo&&o.real!=null&&o.plan!=null&&(o.plan-o.real)>CONFIG.tolPrazo) return 'PRAZO';\n  if(o.margem!=null&&o.margem<CONFIG.metaMargem) return 'MARGEM';\n  return 'CUSTO';\n}\nfunction discPanel(k){\n  var lst=OBRAS.filter(function(o){return o.d===k;});\n  var a=agg(lst), c=statusCor(a.health);\n  function bar(lbl,score,val){ var bc=score==null?K.ink3:statusCor(score), w=score==null?6:Math.max(5,Math.min(100,score));\n    return '<div style=\"display:flex;align-items:center;gap:10px;margin-top:13px\"><span style=\"width:52px;font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:'+K.ink3+'\">'+lbl+'<\u002Fspan>'\n      + '<span style=\"flex:1;height:10px;background:'+K.track+';border-radius:5px;overflow:hidden\"><span style=\"display:block;height:100%;width:'+w+'%;background:'+bc+';border-radius:5px\"><\u002Fspan><\u002Fspan>'\n      + '<span style=\"width:50px;text-align:right;font-family:\\'IBM Plex Mono\\',monospace;font-size:13px;font-weight:600;color:'+bc+'\">'+val+'<\u002Fspan><\u002Fdiv>'; }\n  // pior obra ativa da disciplina\n  var ativas=lst.filter(function(o){return o.ativo;}).map(function(o){return {o:o,h:agg([o]).health};}).sort(function(x,y){return x.h-y.h;});\n  var pior=ativas.length?ativas[0]:null, melhor=ativas.length?ativas[ativas.length-1]:null;\n  var tagCor={PRAZO:K.amber,CUSTO:K.acc,MARGEM:K.red};\n  function obraLine(lab,labCor,it){ if(!it)return ''; var o=it.o, dc=statusCor(it.h);\n    return '<div style=\"display:flex;align-items:center;gap:9px;margin-top:9px\"><span style=\"font-size:10px;font-weight:700;letter-spacing:.5px;color:'+labCor+';min-width:38px\">'+lab+'<\u002Fspan>'\n      + '<span style=\"width:9px;height:9px;border-radius:50%;background:'+dc+';flex:0 0 auto\"><\u002Fspan>'\n      + '<span style=\"flex:1;font-size:13px;font-weight:600;color:'+K.ink+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">'+o.nome+'<\u002Fspan>'\n      + (lab==='PIOR'?'<span style=\"font-size:10px;font-weight:700;color:'+tagCor[tagObra(o)]+';background:'+statusTint(it.h)+';border:1px solid '+tagCor[tagObra(o)]+';border-radius:11px;padding:2px 8px\">'+tagObra(o)+'<\u002Fspan>':'<span style=\"font-family:\\'IBM Plex Mono\\',monospace;font-size:12px;color:'+K.ink3+'\">'+Math.round(it.h)+'<\u002Fspan>')\n    + '<\u002Fdiv>'; }\n  return '<div style=\"flex:1;display:flex;flex-direction:column;background:'+K.card+';border:1px solid '+K.line+';border-left:5px solid '+c+';border-radius:16px;padding:18px 22px\">'\n    + '<div style=\"display:flex;justify-content:space-between;align-items:center\">'\n    +   '<div><div style=\"font-family:\\'Newsreader\\',serif;font-weight:600;font-size:22px;color:'+K.ink+'\">'+DISC[k].nome+'<\u002Fdiv><div style=\"font-size:11.5px;color:'+K.ink3+'\">'+a.ativos+' ativas · '+rs(a.fatSum)+'<\u002Fdiv><\u002Fdiv>'\n    +   '<div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-family:\\'Newsreader\\',serif;font-weight:600;font-size:32px;color:'+c+'\">'+Math.round(a.health)+'<\u002Fspan><span style=\"font-size:10px;font-weight:700;color:'+c+';background:'+statusTint(a.health)+';border:1px solid '+c+';border-radius:13px;padding:3px 8px\">'+statusWord(a.health)+'<\u002Fspan><\u002Fdiv>'\n    + '<\u002Fdiv>'\n    + '<div style=\"flex:1;display:flex;flex-direction:column;justify-content:center\">'\n    + bar('Crono',a.ss,ppTxt(a.sched))+bar('Custo',a.sc,ppTxt(a.cost))+bar('Margem',a.sm,vg(a.margem,0)+'%')+bar('Caixa',a.sk,a.caixa==null?'n/d':ppTxt(a.caixa))\n    + '<\u002Fdiv>'\n    + '<div style=\"padding-top:14px;border-top:1px solid '+K.line+'\">'+obraLine('PIOR',K.red,pior)+obraLine('MELHOR',K.green,melhor)+'<\u002Fdiv>'\n  + '<\u002Fdiv>';\n}\nfunction statRow(lbl,val,cor){\n  return '<div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:1px solid '+K.line+'\"><span style=\"font-size:14px;color:'+K.ink2+'\">'+lbl+'<\u002Fspan><span style=\"font-family:\\'IBM Plex Mono\\',monospace;font-size:18px;font-weight:600;color:'+(cor||K.ink)+'\">'+val+'<\u002Fspan><\u002Fdiv>';\n}\n\n/* ─────────── RENDER (tela única) ─────────── */\nfunction render(){\n  var P=agg(OBRAS), col=statusCor(P.health), word=statusWord(P.health);\n  var discs=['TUB','PIN','CIV'].map(function(k){return {k:k,a:agg(OBRAS.filter(function(o){return o.d===k;}))};});\n  var pior=discs.slice().sort(function(x,y){return x.a.health-y.a.health;})[0];\n  var criticas=OBRAS.filter(function(o){return o.ativo;}).filter(function(o){var h=agg([o]).health; return h!=null&&h<55;});\n  var clk='<span class=\"clk\">--:--<\u002Fspan>';\n  var html=''\n  + '<div style=\"width:100%;height:100%;box-sizing:border-box;display:flex;flex-direction:column;background:'+K.bg+\";color:\"+K.ink+\";font-family:'IBM Plex Sans',sans-serif;padding:40px 52px 30px;overflow:hidden\\\">\"\n  // header\n  + '<div style=\"display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1.5px solid '+K.line+';padding-bottom:18px\">'\n  +   '<div style=\"display:flex;gap:18px;align-items:stretch\"><div style=\"width:6px;border-radius:3px;background:'+K.acc+'\"><\u002Fdiv>'\n  +     '<div><div style=\"font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:'+K.acc+'\">Painel de Controle · Gestão à Vista<\u002Fdiv>'\n  +       '<div style=\"font-family:\\'Newsreader\\',serif;font-weight:600;font-size:46px;line-height:.98;color:'+K.ink+'\">Termômetro da Carteira<\u002Fdiv>'\n  +       '<div style=\"font-size:15.5px;color:'+K.ink2+'\">17 obras · '+rs(P.fatSum)+' em contratos · onde a diretoria deve focar<\u002Fdiv><\u002Fdiv><\u002Fdiv>'\n  +   '<div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:9px\"><div style=\"font-family:\\'Newsreader\\',serif;font-weight:600;font-size:30px;letter-spacing:1px;color:'+K.ink+'\">AZ-TECH<\u002Fdiv>'\n  +     '<div style=\"display:flex;align-items:center;gap:9px;background:#fff;border:1px solid '+K.line+';border-radius:8px;padding:7px 13px\"><span style=\"width:8px;height:8px;border-radius:50%;background:'+K.green+';animation:liveDot 2s ease-in-out infinite\"><\u002Fspan><span style=\"font-family:\\'IBM Plex Mono\\',monospace;font-size:13px;color:'+K.ink2+'\">AO VIVO '+clk+'<\u002Fspan><span style=\"font-family:\\'IBM Plex Mono\\',monospace;font-size:13px;color:'+K.ink3+'\">· Base 22.06.26<\u002Fspan><\u002Fdiv><\u002Fdiv>'\n  + '<\u002Fdiv>'\n  // corpo\n  + '<div style=\"flex:1;display:flex;gap:24px;margin-top:22px;min-height:0\">'\n  // ── coluna esquerda: gauge grande ──\n  +   '<div style=\"flex:0 0 33%;display:flex;flex-direction:column;gap:18px;min-height:0\">'\n  +     '<div style=\"flex:1;background:'+K.card+';border:1px solid '+K.line+';border-top:5px solid '+col+';border-radius:22px;padding:22px 28px 20px;display:flex;flex-direction:column;align-items:center\">'\n  +       '<div style=\"align-self:flex-start;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:'+K.ink2+'\">Saúde Geral da Carteira<\u002Fdiv>'\n  +       '<div style=\"width:88%;margin-top:10px;position:relative\">'+gauge(P.health,GBIG)+'<\u002Fdiv>'\n  +       '<div style=\"font-family:\\'Newsreader\\',serif;font-weight:600;font-size:72px;line-height:.85;color:'+K.ink+';margin-top:-6px\">'+Math.round(P.health)+'<span style=\"font-size:30px;color:'+K.ink3+'\">/100<\u002Fspan><\u002Fdiv>'\n  +       '<div style=\"margin-top:10px;font-size:18px;font-weight:700;letter-spacing:2px;color:'+col+';background:'+statusTint(P.health)+';border:1px solid '+col+';border-radius:24px;padding:7px 24px\">'+word+'<\u002Fdiv>'\n  +       '<div style=\"margin-top:16px;display:flex;gap:26px;justify-content:center\">'+dotLight(discs[0].a.health,'TUBUL.')+dotLight(discs[1].a.health,'PINT.')+dotLight(discs[2].a.health,'CIVIS')+'<\u002Fdiv>'\n  +       '<div style=\"margin-top:16px;font-size:14px;line-height:1.5;color:'+K.ink2+';text-align:center\">Margem e custos saudáveis; <strong style=\"color:'+K.ink+'\">cronograma<\u002Fstrong> é o ponto fraco — <strong style=\"color:'+statusCor(pior.a.health)+'\">'+DISC[pior.k].nome+'<\u002Fstrong> exige atenção imediata.<\u002Fdiv>'\n  +     '<\u002Fdiv>'\n  +   '<\u002Fdiv>'\n  // ── coluna direita ──\n  +   '<div style=\"flex:1;display:flex;flex-direction:column;gap:18px;min-height:0\">'\n  // 4 gauges\n  +     '<div style=\"display:flex;gap:18px\">'\n  +       gaugeMed('Cronograma',P.ss,ppTxt(P.sched),'físico × planejado')\n  +       gaugeMed('Custos',P.sc,ppTxt(P.cost),'físico − financeiro')\n  +       gaugeMed('Margem',P.sm,vg(P.margem,0)+'%','meta '+CONFIG.metaMargem+'%')\n  +       gaugeMed('Caixa',P.sk,rs(P.medSum),'a faturar · '+ppTxt(P.caixa))\n  +     '<\u002Fdiv>'\n  // disciplinas + stats\n  +     '<div style=\"flex:1;display:flex;gap:18px;min-height:0\">'\n  +       '<div style=\"flex:1;display:flex;gap:16px\">'+discPanel('TUB')+discPanel('PIN')+discPanel('CIV')+'<\u002Fdiv>'\n  +       '<div style=\"flex:0 0 30%;background:'+K.card+';border:1px solid '+K.line+';border-radius:16px;padding:18px 24px;display:flex;flex-direction:column\">'\n  +         '<div style=\"font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:'+K.acc+';margin-bottom:4px\">Carteira em números<\u002Fdiv>'\n  +         statRow('Obras (ativas)',P.n+' ('+P.ativos+')')\n  +         statRow('Faturamento',rs(P.fatSum))\n  +         statRow('Margem bruta proj.',vg(P.margem,0)+'%',K.green)\n  +         statRow('Resultado bruto',rs(P.mbRS),K.green)\n  +         statRow('Medições a faturar',rs(P.medSum),K.acc)\n  +         '<div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:11px 0\"><span style=\"font-size:14px;color:'+K.ink2+'\">Obras críticas<\u002Fspan><span style=\"font-family:\\'IBM Plex Mono\\',monospace;font-size:18px;font-weight:600;color:'+(criticas.length?K.red:K.green)+'\">'+criticas.length+'<\u002Fspan><\u002Fdiv>'\n  +         '<div style=\"margin-top:auto;font-size:12.5px;line-height:1.4;color:'+K.ink3+'\">'+(criticas.length?criticas.length+' obras em estado crítico — '+(criticas.filter(function(o){return o.d===\"PIN\";}).length)+' em Pinturas.':'Sem obras críticas.')+'<\u002Fdiv>'\n  +       '<\u002Fdiv>'\n  +     '<\u002Fdiv>'\n  +   '<\u002Fdiv>'\n  + '<\u002Fdiv>'\n  // rodapé\n  + '<div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:18px;font-size:12.5px;color:'+K.ink3+'\"><div>Indicadores ponderados por valor de contrato e recalculados automaticamente a partir das obras · meta de margem '+CONFIG.metaMargem+'% · tolerância de atraso '+CONFIG.tolPrazo+' pp.<\u002Fdiv><div>AZ-TECH · Gerência de Engenharia<\u002Fdiv><\u002Fdiv>'\n  + '<\u002Fdiv>';\n  canvas.innerHTML=html;\n  tickClock();\n}\n\n/* ─────────── ENGINE (mínima · tela única) ─────────── */\nvar canvas=document.getElementById('canvas');\nloadCfg();\nfunction loadCfg(){ try{var s=JSON.parse(localStorage.getItem('termoAZ.cfg')||'{}'); if(typeof s.metaMargem==='number')CONFIG.metaMargem=s.metaMargem; if(typeof s.tolPrazo==='number')CONFIG.tolPrazo=s.tolPrazo;}catch(e){} }\nfunction saveCfg(){ try{localStorage.setItem('termoAZ.cfg',JSON.stringify({metaMargem:CONFIG.metaMargem,tolPrazo:CONFIG.tolPrazo}));}catch(e){} }\nfunction fit(){ var s=Math.min(window.innerWidth/1920, window.innerHeight/1080); canvas.style.transform='scale('+s+')'; }\nfunction tickClock(){ var t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); var els=document.getElementsByClassName('clk'); for(var i=0;i<els.length;i++)els[i].textContent=t; }\n\nvar chrome=document.getElementById('chrome'), hideT=null;\nfunction poke(){ chrome.classList.remove('hidden'); if(hideT)clearTimeout(hideT); hideT=setTimeout(function(){ if(!document.getElementById('cfg').classList.contains('open'))chrome.classList.add('hidden'); },3500); }\nwindow.addEventListener('mousemove',poke);\n\nfunction openCfg(){ document.getElementById('cfg').classList.add('open'); chrome.classList.remove('hidden'); syncCfg(); }\nfunction closeCfg(){ document.getElementById('cfg').classList.remove('open'); render(); poke(); }\nfunction syncCfg(){ document.getElementById('mNum').textContent=CONFIG.metaMargem; document.getElementById('mRange').value=CONFIG.metaMargem; document.getElementById('tNum').textContent=CONFIG.tolPrazo; document.getElementById('tRange').value=CONFIG.tolPrazo; }\nfunction setMeta(v){ CONFIG.metaMargem=Math.max(15,Math.min(45,v)); saveCfg(); syncCfg(); render(); }\nfunction setTol(v){ CONFIG.tolPrazo=Math.max(5,Math.min(30,v)); saveCfg(); syncCfg(); render(); }\nfunction toggleFull(){ try{ if(!document.fullscreenElement){ (document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen).call(document.documentElement); } else { (document.exitFullscreen||document.webkitExitFullscreen).call(document); } }catch(e){} }\ndocument.getElementById('gear').onclick=openCfg;\ndocument.getElementById('full').onclick=function(){toggleFull();poke();};\ndocument.getElementById('mMinus').onclick=function(){setMeta(CONFIG.metaMargem-1);};\ndocument.getElementById('mPlus').onclick=function(){setMeta(CONFIG.metaMargem+1);};\ndocument.getElementById('mRange').oninput=function(){setMeta(parseInt(this.value,10));};\ndocument.getElementById('tMinus').onclick=function(){setTol(CONFIG.tolPrazo-1);};\ndocument.getElementById('tPlus').onclick=function(){setTol(CONFIG.tolPrazo+1);};\ndocument.getElementById('tRange').oninput=function(){setTol(parseInt(this.value,10));};\ndocument.getElementById('cfgx').onclick=closeCfg;\ndocument.getElementById('cfgok').onclick=closeCfg;\ndocument.getElementById('cfg').onclick=function(e){ if(e.target===this)closeCfg(); };\ndocument.addEventListener('keydown',function(e){ var open=document.getElementById('cfg').classList.contains('open');\n  if(open){ if(e.key==='Escape'||e.key==='Enter')closeCfg(); return; } poke();\n  if(e.key==='c'||e.key==='C')openCfg(); if(e.key==='f'||e.key==='F')toggleFull(); });\n\n/* boot */\nwindow.addEventListener('resize',fit);\nrender(); fit(); setInterval(tickClock,20000); poke();\n\n/* neutraliza overlay de erro do empacotador em TVs antigas */\nfunction limpaOverlayBundle(){ var e=document.getElementById('__bundler_err'); if(e&&e.parentNode)e.parentNode.removeChild(e); var l=document.getElementById('__bundler_loading'); if(l&&l.parentNode)l.parentNode.removeChild(l); }\ntry{ window.addEventListener('error',function(ev){ if(ev&&ev.stopImmediatePropagation)ev.stopImmediatePropagation(); setTimeout(limpaOverlayBundle,0); return true; },true); }catch(_){}\nwindow.onerror=function(){ limpaOverlayBundle(); return true; };\nlimpaOverlayBundle(); setInterval(limpaOverlayBundle,1000);\n\n/* anti-descanso: vídeo invisível em loop + Wake Lock */\n(function(){ var v=document.getElementById('keepawake');\n  function playVid(){ if(!v)return; var p=v.play(); if(p&&p.catch)p.catch(function(){}); }\n  if(v){ v.addEventListener('pause',playVid); v.addEventListener('ended',function(){try{v.currentTime=0;}catch(e){}playVid();}); playVid(); setInterval(function(){if(v.paused||v.ended)playVid();},4000); }\n  var wl=null; function reqLock(){ try{ if(navigator.wakeLock&&navigator.wakeLock.request){ navigator.wakeLock.request('screen').then(function(s){wl=s; if(wl)wl.addEventListener('release',function(){wl=null;});}).catch(function(){}); } }catch(e){} }\n  reqLock(); document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible'){reqLock();playVid();} });\n  setInterval(function(){ if(!wl)reqLock(); },30000);\n  ['keydown','mousemove','click'].forEach(function(ev){ window.addEventListener(ev,function(){ if(v&&(v.paused||v.ended))playVid(); if(!wl)reqLock(); }); });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
